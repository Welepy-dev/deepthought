worker_processes auto; # Define quantos processos workers o Nginx vai criar automaticamente baseado na quantidade de núcleos de CPU disponíveis.

events {
  worker_connections 1024; # Cada worker process pode lidar com até 1024 conexões simultâneas. Ajuste conforme necessário para o ambiente.
}

http {
  include /etc/nginx/mime.types; # Define os tipos MIME para os arquivos servidos pelo Nginx.
  default_type application/octet-stream; # Define o tipo MIME padrão para arquivos que não possuem uma extensão conhecida.
  sendfile on; # Permite que o Nginx use o sistema de arquivos para enviar arquivos diretamente para a rede, melhorando a performance.
  tcp_nopush on; # Agrupa os pacotes TCP para reduzir a sobrecarga de rede.
  tcp_nodelay on; # Desativa o algoritmo Nagle para reduzir a latência em conexões TCP. (Envia pacotes imediatamente).
  keepalive_timeout 65; # Mantém as conexões HTTP abertas por 65 segundos, permitindo que os clientes reutilizem conexões para múltiplas requisições.
  client_max_body_size 20m; # Permite upload de arquivos de até 20 megabytes.

  server_tokens off; # Desativa a exibição da versão do Nginx nos cabeçalhos da resposta.

  # WebSocket / Socket.IO precisa deste mapa para os headers Upgrade/Connection.
  map $http_upgrade $connection_upgrade {
    default upgrade; # Para conexões WebSocket, define o header Connection como "Upgrade".
    '' close;
  }

  # HTTP existe apenas para redirecionar para HTTPS.
  server {
    listen 80; # Escuta na porta 80 para requisições HTTP.
    listen [::]:80;
    server_name localhost 127.0.0.1; # Define os nomes de host para os quais este servidor responde.

    # Mantém o redireccionamento explícito para todo o tráfego em claro.
    return 301 https://$host$request_uri; # Redireciona todas as requisições HTTP para HTTPS, preservando o host e a URI da requisição.
  }

  # Servidor TLS principal que encaminha React e NestJS.
  server {
    listen 443 ssl http2; # Escuta na porta 443 para requisições HTTPS, habilitando HTTP/2 para melhor performance.
    listen [::]:443 ssl http2;
    server_name localhost 127.0.0.1; # Define os nomes de host para os quais este servidor responde.

    ssl_certificate /etc/nginx/ssl/cert.pem; # Define o caminho para o certificado SSL.
    ssl_certificate_key /etc/nginx/ssl/privkey.pem; # Define o caminho para a chave privada do certificado SSL.
    ssl_protocols TLSv1.2 TLSv1.3; # Habilita apenas os protocolos TLS 1.2 e 1.3, que são considerados seguros.
    ssl_prefer_server_ciphers on; # Prioriza as cifras definidas pelo servidor para conexões TLS.
    ssl_session_cache shared:SSL:10m; # Habilita o cache de sessões SSL para melhorar a performance de conexões TLS subsequentes.
    ssl_session_timeout 10m; # Define o tempo de expiração para sessões SSL no cache.

    # Segurança básica para browsers modernos.
    add_header X-Frame-Options "DENY" always; # Impede que a página seja carregada em um frame, protegendo contra ataques de clickjacking. 
    add_header X-Content-Type-Options "nosniff" always; # Impede que o navegador faça "sniffing" do tipo de conteúdo, forçando-o a respeitar o tipo MIME declarado.
    add_header X-XSS-Protection "1; mode=block" always; # Habilita a proteção contra Cross-Site Scripting (XSS) em navegadores antigos, bloqueando a página se um ataque for detectado.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # Informa aos navegadores para sempre usar HTTPS ao acessar o site, incluindo subdomínios, por um ano.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # Controla o envio do header Referer, enviando apenas a origem para requisições cross-origin e o caminho completo para requisições same-origin.

    # Proxy comum para preservar host, ip real e protocolo original.
    proxy_set_header Host $host; # Preserva o header Host original da requisição, garantindo que o backend receba o nome do host solicitado pelo cliente.
    proxy_set_header X-Real-IP $remote_addr; # Preserva o endereço IP real do cliente.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Adiciona o endereço IP do cliente à lista de cabeçalhos X-Forwarded-For.
    proxy_set_header X-Forwarded-Proto https; # Preserva o protocolo original da requisição, garantindo que o backend receba o protocolo correto.
    proxy_set_header X-Forwarded-Host $host; # Preserva o nome do host original da requisição, garantindo que o backend receba o nome do host correto.
    proxy_http_version 1.1; # Define a versão HTTP para 1.1.
    proxy_buffering off; # Desativa o buffer de resposta do proxy.

    # SPA React servida pelo container frontend.
    location / {
      proxy_pass http://frontend:80; # Encaminha as requisições para o container frontend na porta 80, onde o React está servido. O Nginx atua como um proxy reverso, encaminhando as requisições para o backend do React.
    }

    # API NestJS, com o prefixo /api removido no proxy_pass terminado com /.
    location = /api {
      return 301 /api/; # Redireciona requisições para /api sem a barra final para /api/, garantindo que o proxy_pass funcione corretamente. Isso é importante porque o proxy_pass com uma barra final remove o prefixo /api da URI encaminhada para o backend.
    }

    location /api/ {
      proxy_pass http://backend:3000/; # Encaminha as requisições para o container backend na porta 3000, onde a API NestJS está rodando. O Nginx atua como um proxy reverso, encaminhando as requisições para o backend da API.
    }

    # Socket.IO precisa de headers de upgrade para WebSocket.
    location = /socket.io {
      return 301 /socket.io/; # Redireciona requisições para /socket.io sem a barra final para /socket.io/, garantindo que o proxy_pass funcione corretamente. Isso é importante porque o proxy_pass com uma barra final remove o prefixo /socket.io da URI encaminhada para o backend.
    }

    location /socket.io/ {
      proxy_set_header Upgrade $http_upgrade; # Define o header Upgrade para o valor do header Upgrade da requisição original, permitindo que o Nginx reconheça e encaminhe conexões WebSocket corretamente.
      proxy_set_header Connection $connection_upgrade; # Define o header Connection para o valor do header Connection da requisição original, permitindo que o Nginx reconheça e encaminhe conexões WebSocket corretamente.
      proxy_pass http://backend:3000/socket.io/; # Encaminha as requisições para o container backend na porta 3000, onde a API NestJS está rodando, especificamente para o endpoint /socket.io/. O Nginx atua como um proxy reverso, encaminhando as requisições para o backend da API, garantindo que as conexões WebSocket sejam tratadas corretamente.
    }
  }
}
