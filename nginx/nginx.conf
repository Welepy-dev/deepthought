events {
    worker_connections 1024;
}

http {
    client_max_body_size 15m;

    # DNS embutido do Docker: resolve "backend"/"frontend" a cada pedido em vez
    # de fixar o IP no arranque, para sobreviver a `docker compose restart`
    # (que muda o IP do container) sem precisar reiniciar o nginx também.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        # REST API + uploads: mesma origem que o resto, o backend já serve
        # ambos sob estes prefixos (setGlobalPrefix('api') + useStaticAssets).
        location /api/ {
            set $upstream_backend backend:3000;
            proxy_pass http://$upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            set $upstream_backend backend:3000;
            proxy_pass http://$upstream_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.io faz upgrade para websocket; sem estes headers o handshake
        # cai de volta para long-polling atrás do proxy.
        location /socket.io/ {
            set $upstream_backend backend:3000;
            proxy_pass http://$upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Resto vai para o Vite dev server; upgrade também é necessário para o
        # WebSocket do HMR não cair silenciosamente em polling.
        location / {
            set $upstream_frontend frontend:5173;
            proxy_pass http://$upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
