# Servidor estático para a SPA React produzida pelo build do Vite.
# O NGINX interno existe para garantir fallback para index.html em rotas como /Game.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # As rotas do React devem resolver para index.html para suportar refresh directo.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets gerados pelo Vite podem ser cacheados agressivamente.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
