services:
  postgres:
    image: postgres:16
    container_name: transcendence_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transcendence_network

  backend:
    build: ./backend
    container_name: transcendence_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    networks:
      - transcendence_network

  frontend:
    build: ./frontend
    container_name: transcendence_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_SERVER_ORIGIN: https://localhost:8443
      VITE_HMR_CLIENT_PORT: 8443
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - transcendence_network

  nginx:
    image: nginx:1.27-alpine
    container_name: transcendence_nginx
    restart: unless-stopped
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - transcendence_network

volumes:
  postgres_data:
  uploads:

networks:
  transcendence_network:
    driver: bridge